services:
  app:
    image: schellingboard/schellingboard
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - data:/data
    environment:
      DATABASE_URL: file:/data/data.db
      SITE_PASSWORD: ${SITE_PASSWORD:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  data:
